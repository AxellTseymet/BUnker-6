<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker-6</title>
    <link rel="icon" type="image/x-icon" href="img/panzer.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @font-face { font-family: 'Warface'; src: url('img/Warface.ttf'); }
        @font-face { font-family: 'Wolfenstein'; src: url('img/wolfenstein.ttf'); }

        :root {
            --bg: #000; --card: #080808; --text: #fff; --sub: #bbb;
            --accent: #ffcc00; --border: #222; --red: #ff4444;
            --stripe: repeating-linear-gradient(45deg, #ffcc00, #ffcc00 15px, #000 15px, #000 30px);
        }

        body.light-mode {
            --bg: #e0e0e0; --card: #fff; --text: #000; --sub: #444;
            --accent: #cc0000; --border: #999;
            --stripe: repeating-linear-gradient(45deg, #cc0000, #cc0000 15px, #eee 15px, #eee 30px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; font-family: 'Warface', sans-serif; transition: background 0.2s, color 0.2s; }
        
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        #custom-cursor {
            width: 32px; height: 32px; background-image: url('img/aim.png'); 
            background-size: contain; background-repeat: no-repeat;
            position: fixed; pointer-events: none; z-index: 10005; transform: translate(-50%, -50%);
        }

        body::before, body::after {
            content: ""; position: fixed; top: 0; width: 25px; height: 100%;
            background: var(--stripe); z-index: 5000; opacity: 0.15; pointer-events: none;
        }
        body::before { left: 0; } body::after { right: 0; }

        header { 
            background: var(--bg); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 4px solid var(--accent); height: 90px; 
        }

        .logo-wrap { display: flex; align-items: center; }
        .logo { font-family: 'Wolfenstein', serif !important; font-size: 2.2rem; color: var(--text); white-space: nowrap; }
        .header-pic { height: 55px; margin-right: 12px; }
        
        .header-right { display: flex; gap: 8px; align-items: center; }

        .btn-action {
            background: none; border: 2px solid var(--accent);
            color: var(--accent); padding: 8px 16px; font-weight: bold; font-size: 0.8rem;
        }
        .btn-action:hover { background: var(--accent); color: var(--bg); }

        #access-gate {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#000;
            z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        main { padding: 30px 5%; max-width: 850px; margin: 0 auto; }
        .post-form { background: var(--card); border: 2px solid var(--accent); padding: 20px; margin-bottom: 30px; display: none; }
        .post-form.active { display: block; }

        input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; margin-bottom: 10px; }
        
        .av-selector { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .av-box { width: 42px; height: 42px; border: 2px solid var(--border); opacity: 0.4; object-fit: cover; }
        .av-box.selected { border-color: var(--accent); opacity: 1; transform: scale(1.05); }

        .story-card { background: var(--card); border: 1px solid var(--border); padding: 18px; margin-bottom: 20px; }
        .avatar-post { width: 45px; height: 45px; border: 1px solid var(--accent); margin-right: 12px; object-fit: cover; }

        .post-actions { display: flex; align-items: center; gap: 15px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 12px; }
        .like-btn { display: flex; align-items: center; gap: 6px; cursor: pointer !important; }
        .like-icon { width: 26px; height: 26px; filter: grayscale(1); transition: 0.3s; }
        .liked .like-icon { filter: none; }
        .ans-text { font-size: 0.7rem; color: var(--sub); margin-left: auto; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 10002;
        }
        .modal-content { 
            background: var(--card); border: 4px solid var(--accent); 
            padding: 30px; text-align: center; width: 280px; 
        }
        .lang-btn { width: 100%; padding: 10px; margin-bottom: 8px; background: none; border: 1px solid var(--border); color: var(--text); }

        .comments-section { margin-top: 15px; display: none; padding-left: 10px; border-left: 2px solid var(--accent); }
        .comments-section.active { display: block; }

        @media (max-width: 480px) {
            header { height: 75px; padding: 0 10px; }
            .logo { font-size: 1.7rem; }
            .header-pic { height: 45px; margin-right: 8px; }
            .btn-action { padding: 6px 10px; font-size: 0.65rem; }
            .header-right { gap: 4px; }
            #custom-cursor { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <div id="access-gate">
        <h1 id="gate-text" style="color:#fff; margin-bottom: 20px;">ACCESS?</h1>
        <img src="img/Panzerhund.png" style="width: 180px; margin-bottom: 20px;">
        <div style="display:flex; gap:15px;">
            <button class="btn-action" onclick="confirmEntry()">YES</button>
            <button class="btn-action" style="border-color:var(--red); color:var(--red);" onclick="location.href='https://google.com'">NO</button>
        </div>
    </div>

    <div id="langModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--accent);">LANGUAGE</h2>
            <button class="lang-btn" onclick="setLang('ru')">РУССКИЙ</button>
            <button class="lang-btn" onclick="setLang('en')">ENGLISH</button>
            <button class="lang-btn" onclick="setLang('ua')">УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="setLang('de')">DEUTSCH</button>
            <button class="lang-btn" onclick="setLang('pl')">POLSKI</button>
            <button class="btn-action" style="width:100%; margin-top:10px;" onclick="closeLang()">CLOSE</button>
        </div>
    </div>

    <header>
        <div class="logo-wrap">
            <img src="img/panzer.png" class="header-pic">
            <div class="logo">Bunker-6</div>
        </div>
        <div class="header-right">
            <button class="btn-action" onclick="toggleForm()" id="btn-write">+ POST</button>
            <button class="btn-action" onclick="openLang()">LN</button>
            <button class="btn-action" onclick="toggleTheme()">◑</button>
        </div>
    </header>

    <main>
        <section class="post-form" id="postForm">
            <h2 id="form-title" style="color:var(--accent); margin-bottom:12px;">NEW RECORD</h2>
            <div class="av-selector" id="av-list"></div>
            <input type="file" id="up-file" accept="image/*" style="font-size:0.6rem; border:none; margin-bottom:15px;">
            <input type="text" id="userName" placeholder="NICKNAME...">
            <textarea id="userText" rows="3" placeholder="MESSAGE..."></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" id="btn-send" style="flex:2; background:var(--accent); color:var(--bg);" onclick="sendPost()">SEND</button>
                <button class="btn-action" id="btn-cancel" style="flex:1; border-color:var(--red); color:var(--red);" onclick="toggleForm()">CANCEL</button>
            </div>
        </section>

        <div id="empty-msg" style="text-align:center; color:var(--sub); margin-top:50px; display:none;">НИЧЕГО НЕТУ</div>
        <div id="feed"></div>
    </main>

    <script>
        const translations = {
            ru: { gate: "ВЫ ДЕЙСТВИТЕЛЬНО ХОТИТЕ ЗАЙТИ?", write: "+ ДОНЕСЕНИЕ", title: "НОВАЯ ЗАПИСЬ", send: "ОТПРАВИТЬ", cancel: "ОТМЕНА", nick: "ПОЗЫВНОЙ...", msg: "ТЕКСТ...", comms: "ОТВЕТИТЬ", ans: "ОТВЕТЫ", empty: "НИЧЕГО НЕТУ В БУНКЕРЕ-6" },
            en: { gate: "DO YOU REALLY WANT TO ENTER?", write: "+ DISPATCH", title: "NEW RECORD", send: "SEND", cancel: "CANCEL", nick: "NICKNAME...", msg: "MESSAGE...", comms: "REPLY", ans: "ANSWERS", empty: "NOTHING IN BUNKER-6" },
            ua: { gate: "ВИ ДІЙСНО ХОЧЕТЕ УВІЙТИ?", write: "+ ДОНЕСЕННЯ", title: "НОВИЙ ЗАПИС", send: "ВІДПРАВИТИ", cancel: "СКАСУВАТИ", nick: "ПОЗИВНИЙ...", msg: "ТЕКСТ...", comms: "ВІДПОВІСТИ", ans: "ВІДПОВІДІ", empty: "НІЧОГО НЕМАЄ В БУНКЕРІ-6" },
            de: { gate: "MÖCHTEN SIE BETRETEN?", write: "+ MELDUNG", title: "EINTRAG", send: "SENDEN", cancel: "ABBRECHEN", nick: "NAME...", msg: "TEXT...", comms: "ANTWORTEN", ans: "ANTWORTEN", empty: "NICHTS IM BUNKER" },
            pl: { gate: "CZY CHCESZ WEJŚĆ?", write: "+ RAPORT", title: "NOWY WPIS", send: "WYŚLIJ", cancel: "ANULUJ", nick: "PSEUDONIM...", msg: "TEKST...", comms: "ODPOWIEDZ", ans: "ODPOWIEDZI", empty: "NIC NIE MA W BUNKIERZE" }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCuSiRlhxBhw2IzAmVoRcvzl0QdgjjwjeM",
            authDomain: "bunker-6.firebaseapp.com",
            projectId: "bunker-6",
            databaseURL: "https://bunker-6-default-rtdb.firebaseio.com/",
            appId: "1:6657510111:web:a83530986236374ef8776a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let activeAv = 'img/1.jpg';
        let currentLang = 'ru';
        let openComments = new Set();
        let myLikes = JSON.parse(localStorage.getItem('myLikes') || '{}');

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function openLang() { document.getElementById('langModal').style.display = 'flex'; }
        function closeLang() { document.getElementById('langModal').style.display = 'none'; }
        function setLang(l) { currentLang = l; updateUI(); closeLang(); }

        if (!sessionStorage.getItem('bunker_access')) { document.getElementById('access-gate').style.display = 'flex'; }
        function confirmEntry() { sessionStorage.setItem('bunker_access', 'true'); document.getElementById('access-gate').style.display = 'none'; }

        const avList = document.getElementById('av-list');
        for(let i=1; i<=7; i++) {
            avList.innerHTML += `<img src="img/${i}.jpg" class="av-box ${i===1?'selected':''}" onclick="setAv(this, 'img/${i}.jpg')">`;
        }

        document.addEventListener('mousemove', e => {
            const c = document.getElementById('custom-cursor');
            if(c) { c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'; c.style.opacity = '1'; }
        });

        function toggleForm() { 
            const f = document.getElementById('postForm');
            f.classList.toggle('active');
            if(!f.classList.contains('active')) {
                document.getElementById('userText').value = "";
            }
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('btn-write').textContent = t.write;
            document.getElementById('form-title').textContent = t.title;
            document.getElementById('btn-send').textContent = t.send;
            document.getElementById('btn-cancel').textContent = t.cancel;
            document.getElementById('userName').placeholder = t.nick;
            document.getElementById('userText').placeholder = t.msg;
            document.getElementById('gate-text').textContent = t.gate;
            document.getElementById('empty-msg').textContent = t.empty;
            loadPosts();
        }

        function setAv(el, p) {
            document.querySelectorAll('.av-box').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected'); activeAv = p;
        }

        document.getElementById('up-file').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 120; canvas.height = 120;
                    canvas.getContext('2d').drawImage(img, 0, 0, 120, 120);
                    activeAv = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function sendPost() {
            const n = document.getElementById('userName').value.trim() || "Soldier";
            const t = document.getElementById('userText').value.trim();
            if(!t) return;
            db.ref('posts').push({ name: n, message: t, avatar: activeAv, timestamp: Date.now(), likesCount: 0 });
            toggleForm();
        }

        function toggleLike(id) {
            const ref = db.ref(`posts/${id}/likesCount`);
            if (myLikes[id]) { ref.set(firebase.database.ServerValue.increment(-1)); delete myLikes[id]; } 
            else { ref.set(firebase.database.ServerValue.increment(1)); myLikes[id] = true; }
            localStorage.setItem('myLikes', JSON.stringify(myLikes));
        }

        function addComment(postId) {
            const n = document.getElementById(`cn-${postId}`).value.trim() || "Soldier";
            const t = document.getElementById(`ci-${postId}`).value.trim();
            if (!t) return;
            db.ref(`posts/${postId}/comments`).push({ name: n, text: t, avatar: 'img/1.jpg' });
            document.getElementById(`ci-${postId}`).value = "";
        }

        function toggleComments(id) { 
            const el = document.getElementById(`comments-${id}`);
            if(el.classList.toggle('active')) openComments.add(id); else openComments.delete(id);
        }

        function loadPosts() {
            db.ref('posts').orderByChild('timestamp').on('value', snap => {
                const f = document.getElementById('feed');
                const empty = document.getElementById('empty-msg');
                f.innerHTML = "";
                if (!snap.exists()) { empty.style.display = 'block'; return; } 
                else { empty.style.display = 'none'; }

                let data = [];
                snap.forEach(c => { data.push({id: c.key, ...c.val()}); });
                data.reverse().forEach(p => {
                    let cHtml = ""; let cCount = 0;
                    if (p.comments) {
                        cCount = Object.keys(p.comments).length;
                        for (let k in p.comments) {
                            const c = p.comments[k];
                            cHtml += `<div class="comment-item"><img src="${c.avatar}" class="comment-av">
                                <div><div style="color:var(--accent); font-size:0.65rem;">${c.name}</div>
                                <div style="color:var(--sub); font-size:0.75rem;">${c.text}</div></div></div>`;
                        }
                    }
                    const t = translations[currentLang];
                    const showComms = openComments.has(p.id) ? 'active' : '';
                    const likedClass = myLikes[p.id] ? 'liked' : '';
                    const ansLabel = cCount > 0 ? `${t.ans}: ${cCount}` : "";

                    f.innerHTML += `
                        <div class="story-card">
                            <div style="display:flex; align-items:center;">
                                <img src="${p.avatar}" class="avatar-post">
                                <span style="color:var(--accent); font-size:0.9rem;">${p.name}</span>
                            </div>
                            <p style="margin-top:12px; color:var(--text); font-size:0.85rem;">${p.message}</p>
                            <div class="post-actions">
                                <div class="like-btn ${likedClass}" onclick="toggleLike('${p.id}')"><img src="img/like.png" class="like-icon"><span class="like-count">${p.likesCount || 0}</span></div>
                                <button class="btn-action" style="font-size:0.55rem; padding:4px 10px;" onclick="toggleComments('${p.id}')">${t.comms}</button>
                                <span class="ans-text">${ansLabel}</span>
                            </div>
                            <div class="comments-section ${showComms}" id="comments-${p.id}">
                                <div>${cHtml}</div>
                                <div style="margin-top:10px;">
                                    <input type="text" id="cn-${p.id}" placeholder="${t.nick}" style="font-size:0.65rem; border:1px solid var(--border);">
                                    <div style="display:flex; gap:5px;">
                                        <input type="text" id="ci-${p.id}" placeholder="${t.msg}" style="margin-bottom:0; font-size:0.75rem;">
                                        <button class="btn-action" onclick="addComment('${p.id}')">OK</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }
        updateUI();
        window.clearAllPosts = function() { if(confirm("DELETE ALL?")) db.ref('posts').remove(); };
    </script>
</body>
</html>
