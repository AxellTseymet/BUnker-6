<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker-6</title>
    <link rel="icon" type="image/x-icon" href="img/panzer.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @font-face { font-family: 'Warface'; src: url('img/Warface.ttf'); }
        @font-face { font-family: 'Wolfenstein'; src: url('img/wolfenstein.ttf'); }

        :root {
            --yellow: #ffcc00; --black: #000; --white: #fff; --red: #ff4444;
            --danger-stripe: repeating-linear-gradient(45deg, #ffcc00, #ffcc00 20px, #000 20px, #000 40px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--black); color: var(--white); min-height: 100vh; font-family: sans-serif; overflow-x: hidden; position: relative; }

        #custom-cursor {
            width: 32px; height: 32px; background-image: url('img/aim.png'); 
            background-size: contain; background-repeat: no-repeat;
            position: fixed; pointer-events: none; z-index: 2147483647;
            transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.1s ease;
            animation: cursorPulse 1.5s infinite ease-in-out;
        }

        @keyframes cursorPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; filter: drop-shadow(0 0 5px var(--yellow)); }
        }

        body::before, body::after {
            content: ""; position: fixed; top: 0; width: 45px; height: 100%;
            background: var(--danger-stripe); z-index: 5000; opacity: 0.4;
            clip-path: polygon(0% 0%, 100% 0%, 80% 15%, 100% 30%, 70% 45%, 90% 60%, 65% 75%, 100% 90%, 0% 100%);
            pointer-events: none;
        }
        body::before { left: -15px; }
        body::after { right: -15px; transform: scaleX(-1); }

        header { 
            background: #000; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 5px solid var(--yellow); height: 110px; 
        }

        .logo { font-family: 'Wolfenstein', serif !important; font-size: clamp(1.8rem, 5vw, 3.5rem); text-transform: uppercase; color: var(--white); }
        .header-pic { height: 70px; margin-right: 15px; }
        
        .btn-action {
            font-family: 'Warface', sans-serif !important; background: none; border: 2px solid var(--yellow);
            color: var(--yellow); padding: 10px 20px; font-weight: bold; transition: 0.3s;
        }
        .btn-action:hover { background: var(--yellow); color: #000; }

        #access-gate {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#000;
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        #gate-text {
            font-family: 'Warface', sans-serif !important;
            font-size: clamp(1.2rem, 6vw, 2.5rem);
            margin-top: 20px;
            color: var(--white);
            text-shadow: 0 0 10px var(--red);
        }

        main { padding: 40px 8%; max-width: 900px; margin: 0 auto; position: relative; z-index: 10; }
        .post-form { background: #050505; border: 2px solid var(--yellow); padding: 25px; margin-bottom: 40px; display: none; }
        .post-form.active { display: block; }

        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 10px; font-family: 'Warface'; }
        
        .av-selector { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .av-box { width: 55px; height: 55px; border: 2px solid #222; opacity: 0.5; }
        .av-box.selected { border-color: var(--yellow); opacity: 1; transform: scale(1.1); }

        .story-card { background: #050505; border: 1px solid #222; padding: 20px; margin-bottom: 25px; }
        .avatar-post { width: 50px; height: 50px; border: 1px solid var(--yellow); margin-right: 15px; object-fit: cover; }

        .comments-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; display: none; }
        .comments-section.active { display: block; }
        .comment-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 12px; }
        .comment-av { width: 30px; height: 30px; border: 1px solid var(--yellow); border-radius: 50%; object-fit: cover; }
        .comment-name { color: var(--yellow); font-family: 'Warface'; font-size: 0.75rem; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center;
            align-items: center; z-index: 9999; padding: 15px;
        }
        .modal-overlay.active { display: flex; }
        .lang-box { padding: 30px; border: 4px solid var(--yellow); background: #050505; text-align: center; width: 100%; max-width: 450px; }
        .lang-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #111; color: white; border: 1px solid #333; font-family: 'Warface'; }

        .comm-input-group { margin-top: 15px; padding: 15px; background: #0a0a0a; border: 1px solid #222; }
        .mini-av-box { width: 35px; height: 35px; border: 1px solid #444; opacity: 0.4; }
        .mini-av-box.selected { border-color: var(--yellow); opacity: 1; }

        @media (max-width: 768px) {
            body::before, body::after { width: 20px; opacity: 0.2; }
            header { height: 80px; padding: 0 3%; }
            .header-pic { height: 40px; }
            .logo { font-size: 1.5rem; }
            .btn-action { padding: 8px 12px; font-size: 0.8rem; }
            main { padding: 20px 5%; }
            .story-card { padding: 15px; }
            #custom-cursor { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <div id="access-gate">
        <img src="img/skull.png" style="width: 150px; border: 2px solid var(--red);">
        <h1 id="gate-text">DO YOU REALLY WANT TO ENTER?</h1>
        <div style="display:flex; gap:20px; margin-top: 25px;">
            <button class="btn-action" onclick="enterBunker()">YES</button>
            <button class="btn-action" style="border-color:var(--red); color:var(--red);" onclick="location.href='https://google.com'">NO</button>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <img src="img/panzer.png" class="header-pic">
            <div class="logo">Bunker-6</div>
        </div>
        <div style="display:flex; gap: 10px;">
            <button class="btn-action" onclick="toggleForm()" id="btn-write">ADD A POST</button>
            <button class="btn-action" onclick="toggleLang()">LANGUAGE</button>
        </div>
    </header>

    <div id="langModal" class="modal-overlay">
        <div class="lang-box">
            <h2 style="font-family:'Warface'; color:#fff; margin-bottom:20px;">LANGUAGE</h2>
            <button class="lang-btn" onclick="changeLang('ru')">РУССКИЙ</button>
            <button class="lang-btn" onclick="changeLang('ua')">УКРАЇНСЬКА</button>
            <button class="lang-btn" onclick="changeLang('en')">ENGLISH</button>
            <button class="lang-btn" onclick="changeLang('de')">DEUTSCH</button>
            <button class="lang-btn" onclick="changeLang('pl')">POLSKI</button>
            <button class="btn-action" style="width: 100%; margin-top: 10px;" onclick="toggleLang()">CLOSE</button>
        </div>
    </div>

    <main>
        <section class="post-form" id="postForm">
            <h2 id="form-title" style="font-family:'Warface'; color:var(--yellow); margin-bottom:20px;">NEW RECORD</h2>
            <div class="av-selector">
                <img src="img/1.jpg" class="av-box selected" onclick="setAvatar(this, 'img/1.jpg')">
                <img src="img/2.jpg" class="av-box" onclick="setAvatar(this, 'img/2.jpg')">
                <input type="file" id="up-file" style="width:160px; font-size:0.7rem;">
            </div>
            <input type="text" id="userName" placeholder="NICKNAME...">
            <textarea id="userText" rows="4" placeholder="MESSAGE..."></textarea>
            <button class="btn-action" id="btn-send" style="width:100%; background:var(--yellow); color:#000;" onclick="sendPost()">SEND</button>
        </section>
        <div id="feed"></div>
    </main>

    <script>
        const translations = {
            ru: { gate: "ВЫ ДЕЙСТВИТЕЛЬНО ХОТИТЕ ЗАЙТИ?", write: "+ ДОНЕСЕНИЕ", title: "НОВАЯ ЗАПИСЬ", send: "ОТПРАВИТЬ", nick: "ПОЗЫВНОЙ...", msg: "ТЕКСТ...", comms: "КОММЕНТАРИИ" },
            en: { gate: "DO YOU REALLY WANT TO ENTER?", write: "+ DISPATCH", title: "NEW RECORD", send: "SEND", nick: "NICKNAME...", msg: "MESSAGE...", comms: "COMMENTS" },
            ua: { gate: "ВИ ДІЙСНО ХОЧЕТЕ УВІЙТИ?", write: "+ ДОНЕСЕННЯ", title: "НОВИЙ ЗАПИС", send: "ВІДПРАВИТИ", nick: "ПОЗИВНИЙ...", msg: "ТЕКСТ...", comms: "КОМЕНТАРІ" },
            de: { gate: "WOLLEN SIE WIRKLICH BETRETEN?", write: "+ MELDUNG", title: "NEUER EINTRAG", send: "SENDEN", nick: "RUFNAME...", msg: "NACHRICHT...", comms: "KOMMENTARE" },
            pl: { gate: "CZY NA PEWNO CHCESZ WEJŚĆ?", write: "+ RAPORT", title: "NOWY WPIS", send: "WYŚLIJ", nick: "PSEUDONIM...", msg: "WIADOMOŚĆ...", comms: "KOMENTARZE" }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCuSiRlhxBhw2IzAmVoRcvzl0QdgjjwjeM",
            authDomain: "bunker-6.firebaseapp.com",
            projectId: "bunker-6",
            databaseURL: "https://bunker-6-default-rtdb.firebaseio.com/",
            appId: "1:6657510111:web:a83530986236374ef8776a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let activeAv = 'img/1.jpg';
        let currentLang = 'en';
        let commAvsStore = {};

        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('custom-cursor');
            if(cursor) {
                cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; cursor.style.opacity = '1';
            }
        });

        function enterBunker() { document.getElementById('access-gate').style.display = 'none'; }
        function toggleForm() { document.getElementById('postForm').classList.toggle('active'); }
        function toggleLang() { document.getElementById('langModal').classList.toggle('active'); }

        function changeLang(l) {
            currentLang = l;
            const t = translations[l];
            document.getElementById('gate-text').textContent = t.gate;
            document.getElementById('btn-write').textContent = t.write;
            document.getElementById('form-title').textContent = t.title;
            document.getElementById('btn-send').textContent = t.send;
            document.getElementById('userName').placeholder = t.nick;
            document.getElementById('userText').placeholder = t.msg;
            toggleLang();
            loadPosts(); 
        }

        function setAvatar(el, p) {
            document.querySelectorAll('.av-box').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected'); activeAv = p;
        }

        document.getElementById('up-file').addEventListener('change', e => {
            const r = new FileReader(); r.onload = ev => { activeAv = ev.target.result; }; 
            r.readAsDataURL(e.target.files[0]);
        });

        function setCommAvatar(postId, el, path) {
            document.querySelectorAll(`#comm-avs-${postId} .mini-av-box`).forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            commAvsStore[postId] = path;
        }

        function uploadCommAv(postId, input) {
            const r = new FileReader();
            r.onload = ev => { commAvsStore[postId] = ev.target.result; alert("READY"); };
            r.readAsDataURL(input.files[0]);
        }

        function sendPost() {
            const n = document.getElementById('userName').value.trim() || "Soldier";
            const t = document.getElementById('userText').value.trim();
            if(!t) return;
            db.ref('posts').push({ name: n, message: t, avatar: activeAv, timestamp: Date.now() });
            document.getElementById('userText').value = ""; toggleForm();
        }

        function addComment(postId) {
            const n = document.getElementById(`comm-name-${postId}`).value.trim() || "Soldier";
            const t = document.getElementById(`input-${postId}`).value.trim();
            const av = commAvsStore[postId] || 'img/1.jpg';
            if (!t) return;
            db.ref(`posts/${postId}/comments`).push({ name: n, text: t, avatar: av });
            document.getElementById(`input-${postId}`).value = "";
        }

        function toggleComments(id) { 
            document.getElementById(`comments-${id}`).classList.toggle('active'); 
            if(!commAvsStore[id]) commAvsStore[id] = 'img/1.jpg';
        }

        function loadPosts() {
            db.ref('posts').orderByChild('timestamp').on('value', snap => {
                const f = document.getElementById('feed');
                f.innerHTML = "";
                let entries = [];
                snap.forEach(c => { entries.push({id: c.key, ...c.val()}); });
                entries.reverse();

                entries.forEach(p => {
                    let commsHtml = "";
                    if (p.comments) {
                        for (let key in p.comments) {
                            const c = p.comments[key];
                            commsHtml += `
                                <div class="comment-item">
                                    <img src="${c.avatar || 'img/1.jpg'}" class="comment-av">
                                    <div>
                                        <div class="comment-name">${c.name}</div>
                                        <div style="color:#bbb; font-size:0.8rem;">${c.text}</div>
                                    </div>
                                </div>`;
                        }
                    }

                    f.innerHTML += `
                        <div class="story-card">
                            <div style="display:flex; align-items:center;">
                                <img src="${p.avatar}" class="avatar-post">
                                <span style="font-family:'Warface'; color:var(--yellow);">${p.name}</span>
                            </div>
                            <p style="color:#ccc; margin-top:15px;">${p.message}</p>
                            <button class="btn-action" style="font-size:0.6rem; padding:5px 10px; margin-top:15px;" onclick="toggleComments('${p.id}')">${translations[currentLang].comms}</button>
                            
                            <div class="comments-section" id="comments-${p.id}">
                                <div id="list-${p.id}">${commsHtml}</div>
                                <div class="comm-input-group">
                                    <div id="comm-avs-${p.id}" style="display:flex; gap:10px; margin-bottom:10px; align-items:center; flex-wrap:wrap;">
                                        <img src="img/1.jpg" class="mini-av-box selected" onclick="setCommAvatar('${p.id}', this, 'img/1.jpg')">
                                        <img src="img/2.jpg" class="mini-av-box" onclick="setCommAvatar('${p.id}', this, 'img/2.jpg')">
                                        <input type="file" style="font-size:0.6rem; width:130px;" onchange="uploadCommAv('${p.id}', this)">
                                    </div>
                                    <input type="text" id="comm-name-${p.id}" placeholder="${translations[currentLang].nick}" style="font-size:0.7rem; padding:8px;">
                                    <div style="display:flex; gap:5px;">
                                        <input type="text" id="input-${p.id}" placeholder="${translations[currentLang].msg}" style="margin-bottom:0; font-size:0.8rem;">
                                        <button class="btn-action" style="padding:5px 15px;" onclick="addComment('${p.id}')">OK</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }
        loadPosts();
    </script>
</body>
</html>
