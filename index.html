<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker-6</title>
    <link rel="icon" type="image/x-icon" href="img/panzer.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @font-face { font-family: 'Warface'; src: url('img/Warface.ttf'); }
        @font-face { font-family: 'Wolfenstein'; src: url('img/wolfenstein.ttf'); }

        :root {
            --bg: #000; --card: #080808; --text: #fff; --sub: #bbb;
            --accent: #ffcc00; --border: #222; --red: #ff4444;
        }

        body.light-mode {
            --bg: #e0e0e0; --card: #fff; --text: #000; --sub: #444;
            --accent: #cc0000; --border: #999;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; font-family: 'Warface', sans-serif; transition: background 0.2s, color 0.2s; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            overflow-x: hidden;
            padding-left: 15px;
            padding-right: 15px;
        } 
        body.access-granted { overflow-y: auto; }

        #custom-cursor {
            width: 32px; height: 32px; background-image: url('img/aim.png'); 
            background-size: contain; background-repeat: no-repeat;
            position: fixed; pointer-events: none; z-index: 20000; transform: translate(-50%, -50%);
        }

        .tape-top {
            position: fixed; top: 0; left: 0; width: 100%; height: 15px;
            background: repeating-linear-gradient(45deg, var(--accent), var(--accent) 10px, #000 10px, #000 20px);
            z-index: 9999; animation: moveTape 1s linear infinite;
        }
        .tape-side {
            position: fixed; top: 0; width: 15px; height: 100%;
            background: repeating-linear-gradient(45deg, var(--accent), var(--accent) 10px, #000 10px, #000 20px);
            z-index: 9999;
        }
        .left-t { left: 0; }
        .right-t { right: 0; }

        @keyframes moveTape { from { background-position: 0 0; } to { background-position: 28px 0; } }

        #gate-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none;
        }
        .gate-half {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: #000; transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #gate-left { left: 0; }
        #gate-right { right: 0; }

        .gate-content-fixed {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10001; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            width: 100%; pointer-events: none; text-align: center;
        }
        .gate-content-fixed div, .gate-content-fixed img, .gate-content-fixed button { pointer-events: auto; }
        
        .gate-buttons-row {
            display: flex; gap: 20px; justify-content: center; align-items: center; margin-top: 20px;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .gear-loader { width: 80px; height: 80px; animation: spin 2s linear infinite; margin-bottom: 20px; }

        header { 
            background: var(--bg); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; position: sticky; 
            top: 15px; 
            z-index: 1000; 
            border-bottom: 4px solid var(--accent); height: 90px; 
        }

        .logo { font-family: 'Wolfenstein', serif !important; font-size: 2.2rem; color: var(--text); }
        .header-pic { height: 55px; margin-right: 12px; }

        .btn-action {
            background: none; border: 2px solid var(--accent);
            color: var(--accent); padding: 8px 16px; font-weight: bold; font-size: 0.8rem;
            min-width: 100px;
        }
        .btn-action:hover { background: var(--accent); color: var(--bg); }

        main { 
            padding: 20px 0; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        .post-form { background: var(--card); border: 2px solid var(--accent); padding: 20px; margin-bottom: 30px; display: none; }
        .post-form.active { display: block; }

        input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; margin-bottom: 10px; }
        .av-selector { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .av-box, .av-box-small { border: 2px solid var(--border); opacity: 0.4; object-fit: cover; }
        .av-box { width: 42px; height: 42px; }
        .av-box-small { width: 30px; height: 30px; }
        .selected { border-color: var(--accent) !important; opacity: 1 !important; transform: scale(1.05); }

        .story-card { background: var(--card); border: 1px solid var(--border); padding: 18px; margin-bottom: 20px; }
        .avatar-post { width: 45px; height: 45px; border: 1px solid var(--accent); margin-right: 12px; object-fit: cover; }
        
        .comments-section { margin-top: 15px; display: none; padding-left: 10px; border-left: 2px solid var(--accent); }
        .comments-section.active { display: block; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-start; }
        .comment-av { width: 32px; height: 32px; border: 1px solid var(--accent); object-fit: cover; }
        .time-tag { font-size: 0.65rem; color: var(--sub); margin-left: 10px; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 10002;
        }
        .modal-content { background: var(--card); border: 4px solid var(--accent); padding: 30px; text-align: center; width: 280px; }

        @media (max-width: 480px) {
            header { 
                height: 70px; 
                padding: 0 5px
                margin-top: 0;
            }
            .header-pic { 
                height: 35px;
                margin-right: 3px; 
            }
            .logo { 
                font-size: 1.5rem; 
            }
            header > div:last-child {
                display: flex;
                gap: 3px;
                flex-shrink: 0;
            }
            .btn-action { 
                min-width: auto;
                padding: 5px 8px;
                font-size: 0.7rem;
            }

            .post-form {
                padding: 15px;
            }
            .av-selector {
                gap: 4px;
            }
            .av-box {
                width: 35px;
                height: 35px;
            }

            #custom-cursor { display: none; }
            * { cursor: auto !important; }
            .gate-buttons-row { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <div class="tape-top"></div>
    <div class="tape-side left-t"></div>
    <div class="tape-side right-t"></div>

    <div id="gate-container">
        <div id="gate-left" class="gate-half"></div>
        <div id="gate-right" class="gate-half"></div>

        <div id="gate-ui" class="gate-content-fixed">
            <h1 id="gate-text" style="color:#fff; margin-bottom: 20px; font-size: 3rem;">ACCESS?</h1>
            
            <img src="img/Panzerhund.png" style="width: 220px; max-width: 80%; margin-bottom: 20px;">
            
            <div class="gate-buttons-row">
                <button class="btn-action" style="padding: 15px 50px; font-size: 1.2rem;" onclick="startLoading()">YES</button>
                <button class="btn-action" style="border-color:var(--red); color:var(--red); padding: 15px 50px; font-size: 1.2rem;" onclick="location.href='https://google.com'">NO</button>
            </div>
        </div>

        <div id="loader-view" style="position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index: 11000; display: none; flex-direction: column; align-items: center;">
            <img src="img/gear.png" class="gear-loader">
            <p style="color: var(--accent); letter-spacing: 3px;">LOADING BUNKER...</p>
        </div>
    </div>

    <div id="langModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--accent);">LANGUAGE</h2>
            <button class="btn-action" style="width:100%; margin-bottom:8px;" onclick="setLang('ru')">РУССКИЙ</button>
            <button class="btn-action" style="width:100%; margin-bottom:8px;" onclick="setLang('en')">ENGLISH</button>
            <button class="btn-action" style="width:100%; margin-bottom:8px;" onclick="setLang('ua')">УКРАЇНСЬКА</button>
            <button class="btn-action" style="width:100%; margin-bottom:8px;" onclick="setLang('de')">DEUTSCH</button>
            <button class="btn-action" style="width:100%; margin-bottom:8px;" onclick="setLang('pl')">POLSKI</button>
            <button class="btn-action" style="width:100%; margin-top:10px; border-color: var(--red); color: var(--red);" onclick="closeLang()">X</button>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <img src="img/panzer.png" class="header-pic">
            <div class="logo">Bunker-6</div>
        </div>
        <div>
            <button class="btn-action" onclick="toggleForm()" id="btn-write">+ POST</button>
            <button class="btn-action" onclick="openLang()">LN</button>
            <button class="btn-action" onclick="toggleTheme()">◑</button>
        </div>
    </header>

    <main>
        <section class="post-form" id="postForm">
            <h2 id="form-title" style="color:var(--accent); margin-bottom:12px;">NEW RECORD</h2>
            <div class="av-selector" id="av-list"></div>
            <input type="file" id="up-file" accept="image/*" style="font-size:0.6rem; border:none; margin-bottom:15px;">
            <input type="text" id="userName" placeholder="NICKNAME...">
            <textarea id="userText" rows="3" placeholder="MESSAGE..."></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" id="btn-send" style="flex:2; background:var(--accent); color:var(--bg);" onclick="sendPost()">SEND</button>
                <button class="btn-action" id="btn-cancel" style="flex:1; border-color:var(--red); color:var(--red);" onclick="toggleForm()">CANCEL</button>
            </div>
        </section>
        <div id="feed"></div>
    </main>

    <script>
        const translations = {
            ru: { gate: "ДОСТУП?", write: "+ ДОНЕСЕНИЕ", title: "НОВАЯ ЗАПИСЬ", send: "ОТПРАВИТЬ", cancel: "ОТМЕНА", nick: "ПОЗЫВНОЙ...", msg: "ТЕКСТ...", comms: "ОТВЕТИТЬ", ans: "ОТВЕТЫ" },
            en: { gate: "ACCESS?", write: "+ DISPATCH", title: "NEW RECORD", send: "SEND", cancel: "CANCEL", nick: "NICKNAME...", msg: "MESSAGE...", comms: "REPLY", ans: "ANSWERS" },
            ua: { gate: "ДОСТУП?", write: "+ ДОНЕСЕННЯ", title: "НОВИЙ ЗАПИС", send: "ВІДПРАВИТИ", cancel: "СКАСУВАТИ", nick: "ПОЗИВНИЙ...", msg: "ТЕКСТ...", comms: "ВІДПОВІСТИ", ans: "ВІДПОВІДІ" },
            de: { gate: "ZUGRIFF?", write: "+ MELDUNG", title: "EINTRAG", send: "SENDEN", cancel: "ABBRECHEN", nick: "NAME...", msg: "TEXT...", comms: "ANTWORTEN", ans: "ANTWORTEN" },
            pl: { gate: "DOSTĘP?", write: "+ RAPORT", title: "NOWY WPIS", send: "WYŚLIJ", cancel: "ANULUJ", nick: "PSEUDONIM...", msg: "ТЕКSТ...", comms: "ODPOWIEDZ", ans: "ODPOWIEDZI" }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCuSiRlhxBhw2IzAmVoRcvzl0QdgjjwjeM",
            authDomain: "bunker-6.firebaseapp.com",
            projectId: "bunker-6",
            databaseURL: "https://bunker-6-default-rtdb.firebaseio.com/",
            appId: "1:6657510111:web:a83530986236374ef8776a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let activeAv = 'img/1.jpg', commentAvs = {}, currentLang = 'ru', openComments = new Set(), myLikes = JSON.parse(localStorage.getItem('myLikes') || '{}');

        if (!sessionStorage.getItem('bunker_access')) { 
            document.getElementById('gate-container').style.display = 'block'; 
        } else {
            document.body.classList.add('access-granted');
        }
        
        function startLoading() {
            document.getElementById('gate-ui').style.display = 'none';
            document.getElementById('loader-view').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loader-view').style.display = 'none';
                document.getElementById('gate-left').style.transform = 'translateX(-100%)';
                document.getElementById('gate-right').style.transform = 'translateX(100%)';
                document.body.classList.add('access-granted');
                setTimeout(() => {
                    document.getElementById('gate-container').style.display = 'none';
                    sessionStorage.setItem('bunker_access', 'true');
                }, 1500);
            }, 2000);
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function openLang() { document.getElementById('langModal').style.display = 'flex'; }
        function closeLang() { document.getElementById('langModal').style.display = 'none'; }
        function setLang(l) { currentLang = l; updateUI(); closeLang(); }

        const avList = document.getElementById('av-list');
        for(let i=1; i<=7; i++) {
            avList.innerHTML += `<img src="img/${i}.jpg" class="av-box ${i===1?'selected':''}" onclick="setAv(this, 'img/${i}.jpg')">`;
        }

        document.addEventListener('mousemove', e => {
            const c = document.getElementById('custom-cursor');
            if(c) { c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'; c.style.opacity = '1'; }
        });

        function getStamp(ts) {
            const d = ts ? new Date(ts) : new Date();
            return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + " | " + d.getDate().toString().padStart(2,'0') + "." + (d.getMonth()+1).toString().padStart(2,'0') + "." + d.getFullYear();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('btn-write').textContent = t.write;
            document.getElementById('form-title').textContent = t.title;
            document.getElementById('btn-send').textContent = t.send;
            document.getElementById('btn-cancel').textContent = t.cancel;
            document.getElementById('userName').placeholder = t.nick;
            document.getElementById('userText').placeholder = t.msg;
            document.getElementById('gate-text').textContent = t.gate;
            loadPosts();
        }

        function toggleForm() { document.getElementById('postForm').classList.toggle('active'); }
        function setAv(el, p) {
            document.querySelectorAll('.av-box').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected'); activeAv = p;
        }

        function setCommentAv(postId, el, path) {
            document.querySelectorAll(`.av-comm-${postId}`).forEach(i => i.classList.remove('selected'));
            if(el) el.classList.add('selected');
            commentAvs[postId] = path;
        }

        function uploadCommAv(postId, e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                commentAvs[postId] = ev.target.result;
                document.querySelectorAll(`.av-comm-${postId}`).forEach(i => i.classList.remove('selected'));
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function sendPost() {
            const n = document.getElementById('userName').value.trim() || "Soldier", t = document.getElementById('userText').value.trim();
            if(!t) return;
            db.ref('posts').push({ name: n, message: t, avatar: activeAv, timestamp: Date.now(), likesCount: 0 });
            toggleForm(); document.getElementById('userText').value = "";
        }

        function addComment(postId) {
            const n = document.getElementById(`cn-${postId}`).value.trim() || "Soldier", t = document.getElementById(`ci-${postId}`).value.trim();
            const av = commentAvs[postId] || 'img/1.jpg';
            if (!t) return;
            db.ref(`posts/${postId}/comments`).push({ name: n, text: t, avatar: av, timestamp: Date.now() });
            document.getElementById(`ci-${postId}`).value = "";
        }

        function toggleLike(id) {
            const ref = db.ref(`posts/${id}/likesCount`);
            if (myLikes[id]) { ref.set(firebase.database.ServerValue.increment(-1)); delete myLikes[id]; } 
            else { ref.set(firebase.database.ServerValue.increment(1)); myLikes[id] = true; }
            localStorage.setItem('myLikes', JSON.stringify(myLikes));
        }

        function toggleComments(id) { 
            const el = document.getElementById(`comments-${id}`);
            if(el.classList.toggle('active')) openComments.add(id); else openComments.delete(id);
        }

        function loadPosts() {
            db.ref('posts').orderByChild('timestamp').on('value', snap => {
                const f = document.getElementById('feed'), t = translations[currentLang];
                f.innerHTML = "";
                if (!snap.exists()) return;
                let data = []; snap.forEach(c => { data.push({id: c.key, ...c.val()}); });
                data.reverse().forEach(p => {
                    let cHtml = ""; 
                    if (p.comments) {
                        Object.values(p.comments).sort((a,b) => a.timestamp - b.timestamp).forEach(c => {
                            cHtml += `<div class="comment-item"><img src="${c.avatar}" class="comment-av"><div style="flex:1"><div><b style="color:var(--accent); font-size:0.75rem;">${c.name}</b><span class="time-tag">[${getStamp(c.timestamp)}]</span></div><div style="color:var(--text); font-size:0.8rem;">${c.text}</div></div></div>`;
                        });
                    }
                    let avsHtml = ""; for(let i=1; i<=7; i++) { avsHtml += `<img src="img/${i}.jpg" class="av-box-small av-comm-${p.id} ${i===1?'selected':''}" onclick="setCommentAv('${p.id}', this, 'img/${i}.jpg')">`; }
                    f.innerHTML += `<div class="story-card"><div style="display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center;"><img src="${p.avatar}" class="avatar-post"><span style="color:var(--accent); font-size:0.95rem;">${p.name}</span></div><span class="time-tag">${getStamp(p.timestamp)}</span></div><p style="margin-top:12px; font-size:0.9rem;">${p.message}</p><div style="margin-top:15px; display:flex; gap:15px; align-items:center;"><div onclick="toggleLike('${p.id}')" style="cursor:pointer; font-size:0.8rem;">👍 ${p.likesCount || 0}</div><button class="btn-action" style="padding:4px 8px; font-size:0.6rem;" onclick="toggleComments('${p.id}')">${t.comms}</button></div><div class="comments-section ${openComments.has(p.id) ? 'active' : ''}" id="comments-${p.id}"><div>${cHtml}</div><div style="margin-top:10px; border-top:1px solid var(--border); padding-top:10px;"><div class="av-selector">${avsHtml}<label style="cursor:pointer; border:1px solid var(--accent); padding:2px 5px; font-size:0.7rem; color:var(--accent);">📎<input type="file" hidden accept="image/*" onchange="uploadCommAv('${p.id}', event)"></label></div><input type="text" id="cn-${p.id}" placeholder="${t.nick}" style="font-size:0.7rem;"><div style="display:flex; gap:5px;"><input type="text" id="ci-${p.id}" placeholder="${t.msg}" style="margin:0;"><button class="btn-action" onclick="addComment('${p.id}')">OK</button></div></div></div></div>`;
                });
            });
        }
        updateUI();
    </script>
</body>
</html>
