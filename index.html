    <style>
        @font-face { font-family: 'Warface'; src: url('img/Warface.ttf'); }
        @font-face { font-family: 'Wolfenstein'; src: url('img/wolfenstein.ttf'); }
        :root {
            --bg: #000; --card: #080808; --text: #fff; --sub: #bbb;
            --accent: #ffcc00; --border: #222; --red: #ff4444;
            --reply-bg: #151515;
            --player-bg: #050505;
        }
        body.light-mode {
            --bg: #e0e0e0; --card: #fff; --text: #000; --sub: #444;
            --accent: #cc0000; --border: #999;
            --reply-bg: #f0f0f0;
            --player-bg: #ccc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; font-family: 'Warface', sans-serif; transition: background 0.2s, color 0.2s; }
        body { 
            background: var(--bg); color: var(--text); min-height: 100vh; 
            overflow-x: hidden; padding-left: 15px; padding-right: 15px;
        } 
        body.access-granted { overflow-y: auto; }

        #custom-cursor {
            width: 32px; height: 32px; background-image: url('img/aim.png'); 
            background-size: contain; background-repeat: no-repeat;
            position: fixed; pointer-events: none; z-index: 20000; transform: translate(-50%, -50%);
        }

        .tape-top {
            position: fixed; top: 0; left: 0; width: 100%; height: 15px;
            background: repeating-linear-gradient(45deg, var(--accent), var(--accent) 10px, #000 10px, #000 20px);
            z-index: 9999; animation: moveTape 1s linear infinite;
        }
        .tape-side {
            position: fixed; top: 0; width: 15px; height: 100%;
            background: repeating-linear-gradient(45deg, var(--accent), var(--accent) 10px, #000 10px, #000 20px);
            z-index: 9999;
        }
        .left-t { left: 0; } .right-t { right: 0; }

        @keyframes moveTape { from { background-position: 0 0; } to { background-position: 28px 0; } }

        #gate-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none;
        }
        .gate-half {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: #000; transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #gate-left { left: 0; } #gate-right { right: 0; }

        .gate-content-fixed {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10001; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 100%; pointer-events: none; text-align: center;
        }
        .gate-content-fixed div, .gate-content-fixed img, .gate-content-fixed button { pointer-events: auto; }
        
        .gate-buttons-row { display: flex; gap: 20px; justify-content: center; align-items: center; margin-top: 20px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .gear-loader { width: 80px; height: 80px; animation: spin 2s linear infinite; margin-bottom: 20px; }

        @keyframes loadingDots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
            100% { content: '.'; }
        }
        .animated-dots::after {
            content: '.';
            animation: loadingDots 1.2s infinite;
            letter-spacing: 2px;
        }

        header { 
            background: var(--bg); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; position: sticky; top: 15px; z-index: 1000; 
            border-bottom: 4px solid var(--accent); height: 90px; 
        }
        .logo { font-family: 'Wolfenstein', serif !important; font-size: 2.2rem; color: var(--text); }
        .header-pic { height: 55px; margin-right: 12px; }

        .btn-action {
            background: none; border: 2px solid var(--accent);
            color: var(--accent); padding: 8px 16px; font-weight: bold; font-size: 0.8rem; min-width: 100px;
            cursor: pointer;
        }
        .btn-action:hover { background: var(--accent); color: var(--bg); }

        main { padding: 20px 0; max-width: 850px; margin: 0 auto; }
        .post-form { background: var(--card); border: 2px solid var(--accent); padding: 20px; margin-bottom: 30px; display: none; }
        .post-form.active { display: block; }

        .warning-message { color: #ffcc00; background: rgba(255, 204, 0, 0.15); border: 1px solid #ffcc00; padding: 8px 10px; border-radius: 4px; font-size: 0.85rem; }

        input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; margin-bottom: 10px; }
        .av-selector { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .av-box, .av-box-small { border: 2px solid var(--border); opacity: 0.4; object-fit: cover; cursor: pointer; }
        .av-box { width: 42px; height: 42px; }
        .av-box-small { width: 30px; height: 30px; }
        .selected { border-color: var(--accent) !important; opacity: 1 !important; transform: scale(1.05); }

        .story-card { background: var(--card); border: 1px solid var(--border); padding: 18px; margin-bottom: 20px; animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        .avatar-post { width: 45px; height: 45px; border: 1px solid var(--accent); margin-right: 12px; object-fit: cover; }
        
        .comments-section { margin-top: 15px; display: none; padding-left: 10px; border-left: 2px solid var(--accent); }
        .comments-section.active { display: block; }
        
        .comment-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; padding: 8px; border-radius: 4px; }
        .comment-nested { 
            margin-left: 30px; 
            background: var(--reply-bg); 
            border: 1px dashed var(--border);
            transform: scale(0.95);
            transform-origin: left;
        }
        .comment-av { width: 32px; height: 32px; border: 1px solid var(--accent); object-fit: cover; }
        .time-tag { font-size: 0.65rem; color: var(--sub); margin-left: 10px; }

        .post-img-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .post-img { max-width: 150px; max-height: 150px; border: 1px solid var(--accent); object-fit: cover; }

        .post-audio-container { margin-top: 10px; width: 100%; max-width: 400px; }
        .bunker-player {
            display: flex; align-items: center; background: var(--player-bg);
            border: 1px solid var(--border); padding: 5px 10px; gap: 10px;
            height: 40px; border-left: 3px solid var(--accent);
        }
        .player-btn {
            background: none; border: none; color: var(--accent);
            font-size: 1.2rem; cursor: pointer; width: 25px; text-align: center;
        }
        .player-progress-container {
            flex: 1; height: 6px; background: #222; position: relative; cursor: pointer;
        }
        .player-progress-bar {
            height: 100%; background: var(--accent); width: 0%; position: absolute; top: 0; left: 0;
        }
        .player-time { font-size: 0.65rem; color: var(--sub); font-family: monospace; min-width: 70px; text-align: right; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 10002; overflow-y: auto;
        }
        .modal-content { background: var(--card); border: 4px solid var(--accent); padding: 30px; text-align: center; width: 280px; max-height: 90vh; overflow-y: auto; margin: 20px; }

        .upload-btn-label {
            display: inline-block; border: 1px solid var(--accent); color: var(--accent);
            padding: 5px 10px; font-size: 0.7rem; cursor: pointer; margin-bottom: 10px;
        }
        .upload-btn-label:hover { background: var(--accent); color: var(--bg); }
        .file-status { font-size: 0.6rem; color: var(--accent); margin-left: 5px; vertical-align: middle; }

        @media (max-width: 480px) {
            header { height: 70px; padding: 0 5px; }
            .logo { font-size: 1.5rem; }
            .btn-action { min-width: auto; padding: 5px 8px; font-size: 0.7rem; }
            .comment-nested { margin-left: 15px; }
            #custom-cursor { display: none; }
            * { cursor: auto !important; }

        async function processFiles(files) {
            let arr = [];
            const limit = Math.min(files.length, 5);
            for(let i=0; i<limit; i++) {
                const data = await new Promise(r => { const rd = new FileReader(); rd.onload = (e) => r(e.target.result); rd.readAsDataURL(files[i]); });
                arr.push(data);
            }
            return arr;
        }

            let pass = document.getElementById('authPass').value.trim();

            try {

                errEl.textContent = (e && e.message) ? e.message : "Auth error!";

                errEl.textContent = (e && e.message) ? e.message : "Registration error!";
            }
        };

                errEl.textContent = "Nickname is required";

                try {
                    await db.ref('users/' + currentUser.uid).set({

                    currentUserNickname = nickname;

                    loadPosts();
                } catch (e) {

            }

        async function sendPost() {
            if(isReadOnly()) { showAuth(); return; }
            hideWarning();
            const n = document.getElementById('userName').value.trim() || currentUserNickname || "Soldier", 
                  t = document.getElementById('userText').value.trim();
            const fileInput = document.getElementById('up-file');
            const audioInput = document.getElementById('up-audio');
            let images = [], audios = [];
            if (fileInput.files.length > 0) images = await processFiles(fileInput.files);
            if (audioInput.files.length > 0) audios = await processFiles(audioInput.files);
            if(!t && images.length === 0 && audios.length === 0) {
                showWarning('Введите текст или добавьте медиа, прежде чем отправлять.');
                return;
            }
            let userEmail = (currentUser && currentUser.email) ? currentUser.email : '';
            db.ref('posts').push({ name: n, message: t, avatar: activeAv, images: images, audio: audios, timestamp: Date.now(), likesCount: 0, dislikesCount: 0, userEmail: userEmail });
            toggleForm(); 
            document.getElementById('userText').value = ""; 
            fileInput.value = ""; 
            audioInput.value = "";
            document.getElementById('status-img').textContent = "";
            document.getElementById('status-aud').textContent = "";
        }

                  t = document.getElementById(`ci-${postId}`).value.trim();

            if (audioInput && audioInput.files.length > 0) audios = await processFiles(audioInput.files);

                alert('Введите текст или добавьте медиа, прежде чем отправлять комментарий.');
                return;
            }
            db.ref(`posts/${postId}/comments`).push({ name: n, text: t, avatar: av, images: images, audio: audios, timestamp: Date.now() });
            document.getElementById(`ci-${postId}`).value = ""; 
            if(fileInput) fileInput.value = "";

            const sImg = document.getElementById(`status-comm-img-${postId}`);
            const sAud = document.getElementById(`status-comm-aud-${postId}`);

        function replyTo(postId, name) {

            input.focus();
        }

        function toggleLike(id) {
            if(isReadOnly()) { showAuth(); return; }
            const ref = db.ref(`posts/${id}/likesCount`);
            if (myLikes[id]) { 
                ref.set(firebase.database.ServerValue.increment(-1)); 
                delete myLikes[id]; 
            } else { 
                if(myDislikes[id]) toggleDislike(id);
                ref.set(firebase.database.ServerValue.increment(1)); 
                myLikes[id] = true; 
            }
            localStorage.setItem('myLikes', JSON.stringify(myLikes));
        }
        function toggleDislike(id) {
            if(isReadOnly()) { showAuth(); return; }
            const ref = db.ref(`posts/${id}/dislikesCount`);
            if (myDislikes[id]) {
                ref.set(firebase.database.ServerValue.increment(-1));
                delete myDislikes[id];
            } else {
                if(myLikes[id]) toggleLike(id);
                ref.set(firebase.database.ServerValue.increment(1));
                myDislikes[id] = true;
            }
            localStorage.setItem('myDislikes', JSON.stringify(myDislikes));
        }
        function toggleComments(id) {

        function togglePlay(id) {
            const aud = document.getElementById(`aud-el-${id}`);
            const btn = document.getElementById(`aud-btn-${id}`);
            document.querySelectorAll('audio').forEach(a => { if(a !== aud) { a.pause(); const bId = a.id.replace('aud-el-', 'aud-btn-'); const b = document.getElementById(bId); if(b) b.textContent = '▶'; } });

            if(aud.paused) { aud.play(); btn.textContent = ' ⏸'; } else { aud.pause(); btn.textContent = '▶'; }
        }

        function updateProgress(id) {
            const aud = document.getElementById(`aud-el-${id}`);
            const bar = document.getElementById(`aud-bar-${id}`);
            const timeEl = document.getElementById(`aud-time-${id}`);
            if(aud.duration) {
                const pct = (aud.currentTime / aud.duration) * 100;
                bar.style.width = pct + '%';
                timeEl.textContent = formatTime(aud.currentTime) + ' / ' + formatTime(aud.duration);
            }
        }

        function setAudioProgress(id, e) {
            const aud = document.getElementById(`aud-el-${id}`);
            const container = e.currentTarget;
            const pct = e.offsetX / container.offsetWidth;
            aud.currentTime = pct * aud.duration;
        }

                if (!snap.exists()) return;
                let data = []; snap.forEach(c => { data.push({id: c.key, ...c.val()}); });
                data.reverse().forEach((p, index) => {
                    let cHtml = ""; let cCount = p.comments ? Object.keys(p.comments).length : 0;
                    if (p.comments) {
                        Object.values(p.comments).sort((a,b) => a.timestamp - b.timestamp).forEach(c => {
                            let isNested = c.text.includes('↳') ? 'comment-nested' : '';
                            let cImgs = ""; 
                            if(c.images) c.images.forEach(img => cImgs += `<img src="${img}" class="post-img">`);

                                    <div class="player-progress-bar" id="aud-bar-${u}"></div>

                                <span id="status-comm-img-${p.id}" class="file-status"></span>

                    f.innerHTML += `<div class="story-card" style="animation-delay: ${index * 0.1}s">

        window.deletePost = function(postId, previewMsg) {
            if(!currentUser) return;
            if(!isAdmin) {
                db.ref('posts/' + postId).once('value').then(snap => {
                    const v = snap.val();
                    if (!v) return alert("Not found");
                    if (!v.userEmail || v.userEmail.toLowerCase() !== (currentUser.email||"").toLowerCase()) return alert("Only owner can delete post");
                    doDelete();
                });
            } else {
                doDelete();
            }
            function doDelete() {
                if (confirm("Delete post '" + (previewMsg||'') + "' ?")) {
                    db.ref('posts/' + postId).remove().then(() => {
                    });
                }
            }
        }

            document.getElementById('loader-view').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loader-view').style.display = 'none';
                document.getElementById('gate-left').style.transform = 'translateX(-100%)';
                document.getElementById('gate-right').style.transform = 'translateX(100%)';
                document.body.classList.add('access-granted');
                setTimeout(() => {
                    document.getElementById('gate-container').style.display = 'none';
                    sessionStorage.setItem('bunker_access', 'true');
                    showAuth();
                }, 1500);
            }, 2000);
        }
        updateUI();
        loadPosts();

        console.log('BUnker-6 update', "color: #ffcc00; background:black; padding:4px;");
    </script>
</body>
</html>
